<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RadarIA — Connexion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F5F6FA; color: #111827; font-family: 'Segoe UI', sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box {
    background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 20px;
    padding: 40px; width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .logo { text-align: center; font-size: 28px; font-weight: 800; color: #3b4fd8;
          margin-bottom: 4px; }
  .logo span { color: #111827; }
  .subtitle { text-align: center; color: #9CA3AF; font-size: 13px; margin-bottom: 32px; }
  label { display: block; color: #374151; font-size: 13px; font-weight: 600;
          margin-bottom: 6px; margin-top: 16px; }
  input {
    width: 100%; background: #FFFFFF; border: 1px solid #D1D5DB; border-radius: 10px;
    padding: 12px 16px; color: #111827; font-size: 15px; transition: border-color .2s;
  }
  input:focus { outline: none; border-color: #3b4fd8; }
  .btn {
    display: block; width: 100%; margin-top: 24px; padding: 14px;
    background: #3b4fd8; color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s;
  }
  .btn:hover { background: #2d3cb5; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
           background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Radar<span>IA</span></div>
  <div class="subtitle">Backoffice — Accès administrateur</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for cat, msg in messages %}
  <div class="flash">{{ msg }}</div>
  {% endfor %}{% endif %}
  {% endwith %}
  <form method="post">
    <label>Identifiant</label>
    <input type="text" name="username" autofocus>
    <label>Mot de passe</label>
    <input type="password" name="password">
    <button type="submit" class="btn">Se connecter</button>
  </form>
</div>
</body>
</html>
